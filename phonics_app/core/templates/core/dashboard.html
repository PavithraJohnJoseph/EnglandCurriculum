{% extends "core/base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard">
    <h1>Welcome, <span class="welcome-username">{{ request.user.username }}</span> 👋</h1>

    <div class="dashboard-cards">
        <a href="{% url 'core:year_selection' %}" class="card">
            Start Phonics Practice
        </a>
    </div>
</div>

<style>
.welcome-username {
    font-weight: 800;
    background: linear-gradient(
        90deg,
        #e53935,
        #fb8c00,
        #fdd835,
        #43a047,
        #1e88e5,
        #8e24aa
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
</style>
{% endblock %}
