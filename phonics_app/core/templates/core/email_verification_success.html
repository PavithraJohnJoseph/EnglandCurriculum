{% extends "core/base.html" %}

{% block title %}Email Verified{% endblock %}

{% block content %}
<div style="text-align: center; padding: 50px 20px; max-width: 600px; margin: 0 auto;">
    <h1 style="color: #27ae60; font-size: 2.5em; margin-bottom: 20px;">✓ Email Verified!</h1>
    
    <div style="background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 20px; border-radius: 5px; margin-bottom: 30px;">
        <p style="margin: 0;">
            Thank you {{ user.username }}! Your email has been successfully verified.
        </p>
    </div>
    
    <p style="font-size: 1.1em; color: #555; margin-bottom: 30px;">
        Your account is now fully activated and you have access to all features.
    </p>
    
    <p>
        <a href="{% url 'core:dashboard' %}" style="display: inline-block; padding: 15px 40px; background-color: #27ae60; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 1.1em;">
            Go to Dashboard →
        </a>
    </p>
</div>
{% endblock %}
