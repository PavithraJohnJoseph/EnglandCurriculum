{% extends "core/base.html" %}
{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 4em; color: #e74c3c; margin-bottom: 20px;">500</h1>
    <h2 style="color: #2c3e50; margin-bottom: 20px;">Server Error</h2>
    <p style="font-size: 1.1em; color: #7f8c8d; margin-bottom: 30px;">
        Something went wrong on our end. Our team has been notified and is working on a fix.
        <br><br>
        Please try again later or contact support if the problem persists.
    </p>
    <a href="{% url 'core:home' %}" class="btn auth-btn" style="display: inline-block; padding: 12px 30px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px;">
        Go Home
    </a>
</div>
{% endblock %}
