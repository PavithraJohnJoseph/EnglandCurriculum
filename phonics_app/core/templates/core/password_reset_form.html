{% extends "core/base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Forgot your password?</h2>
        <p>Enter your email address below and we'll send a link to reset your password.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>
            <button type="submit" class="btn auth-btn">Send reset email</button>
        </form>
        <p class="auth-footer">
            <a href="{% url 'core:login' %}">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
