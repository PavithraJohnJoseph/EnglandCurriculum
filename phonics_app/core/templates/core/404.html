{% extends "core/base.html" %}
{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 4em; color: #e74c3c; margin-bottom: 20px;">404</h1>
    <h2 style="color: #2c3e50; margin-bottom: 20px;">Page Not Found</h2>
    <p style="font-size: 1.1em; color: #7f8c8d; margin-bottom: 30px;">
        Sorry, the page you're looking for doesn't exist or has been moved.
    </p>
    <a href="{% url 'core:home' %}" class="btn auth-btn" style="display: inline-block; padding: 12px 30px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px;">
        Go Home
    </a>
</div>
{% endblock %}
