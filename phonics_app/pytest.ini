[pytest]
DJANGO_SETTINGS_MODULE = phonics_app.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=core
    --cov-report=html
    --cov-report=term-missing
    --strict-markers
    -v
testpaths = core/tests
norecursedirs = .venv venv staticfiles media
